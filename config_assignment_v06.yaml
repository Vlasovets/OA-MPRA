---
version: "0.6"
assignments:
  assign_bc_rev_comp_true_v06:
    bc_length: 12
    BC_rev_comp: true
    design_check:
      fast: true
      sequence_collisions: true
    strand_sensitive:
      enable: false
    adapters:
      FWD:
        five_prime:
          - CCAGGACCGGATCAACT  # Remove 17bp adapter (actual sequence) from 5' end of R2
    alignment_tool:
      split_number: 30
      tool: bbmap
      configs:
        sequence_length: 151  # Design file oligo length (matches v0.5.4 config)
        alignment_start: 1
        min_mapping_quality: 30  # ~1 in 1000 chance the mapping is wrong
    BC:
      - /lustre/groups/itg/teams/zeggini/projects/GO2/MPRA/mpra_test/real_data/assignment/forward/24L005276_S11_L001_R1_first12bp.fastq.gz
    FWD:
      - /lustre/groups/itg/teams/zeggini/projects/GO2/MPRA/mpra_test/real_data/assignment/reverse/24L005276_S11_L001_R2_001.fastq.gz
    design_file: /lustre/groups/itg/teams/zeggini/projects/GO2/MPRA/mpra_test/real_data/assignment/designed_oligos_first149bp_with_CC.fasta
    configs:
      default:
        min_support: 1
        fraction: 0.7

