version: "0.5"
experiments:
  exampleCountMinSupport1:
    bc_length: 12
    data_folder: /lustre/groups/itg/teams/zeggini/projects/GO2/MPRA/mpra_test/real_data/counts_barcodes_offset0
    experiment_file: /lustre/groups/itg/teams/zeggini/projects/GO2/MPRA/mpra_test/real_data/counts_barcodes_offset0/experiment_BARCODEONLY_offset0.csv
    demultiplex: false
    assignments:
      fromFile:
        type: file
        assignment_file: /lustre/groups/itg/teams/zeggini/projects/GO2/MPRA/mpra_test/results/assignment/assignMPRAworkshopMinSupport1/assignment_barcodes.default.tsv.gz
    design_file: /lustre/groups/itg/teams/zeggini/projects/GO2/MPRA/mpra_test/real_data/assignment/designed_oligos_first149bp_with_CC.fasta
    configs:
      default:
        filter:
          bc_threshold: 1
          min_dna_counts: 5      # Increase from 1 to reduce noise
          min_rna_counts: 10     # Increase from 1 to reduce noise
          outlier_detection:
            method: rna_counts_zscore
            times_zscore: 3      # Remove barcodes >3 stdev from mean

